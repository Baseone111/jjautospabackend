name: build and deploy
on: [push, pull_request ]

jobs: 
  build:
    environment: 
      name: testing
    env:
      DATABASE_HOSTNAME: ${{secrets.database_hostname}}
      
      DATABASE_PORT: ${{secrets.database_port}}
      DATABASE_NAME: ${{secrets.database_name}}
      DATABASE_PASSWORD: ${{secrets.database_password}}
      DATABASE_USERNAME: ${{secrets.database_username}}

      # JWT Authentication
      SECRET_KEY: ${{secrets.secret_key}}
      ALGORITHM: ${{secrets.algorithm}}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{secrets.access_token_expire_minutes}}
    
    services: 
      mysql:
        image: mysql
        env:
          MYSQL_PASSWORD: ${{secrets.database_password}}
          MYSQL_DB: ${{secrets.database_name}}
        ports:
        - 5432:5432
        #options for health checks follow up here
    runs-on: ubuntu-latest
    steps:
      - name: pulling git repo
        uses: actions/checkout@v2
      - name: installing python
        uses: actions/setup-python@v2
        with:
          python-version: "3.12"
      - name: update pip 
        run: python -m pip install --upgrade pip 
      - name: install all dependencies
        run: pip install -r requirements.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/jjautospa:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
  



  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    # THIS LINE IS CRITICAL: It connects this job to your Production secrets
    environment: 
      name: production 

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }} # This must be the .pem content
          port: 22
          script: |
            if ! [ -x "$(command -v docker)" ]; then
              echo "Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi
            # Login to Docker using Repository Secrets (if moved) 
            # or hardcoded if you haven't moved them yet
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
            
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/jjautospa:latest
            docker stop jjautospa-app || true
            docker rm jjautospa-app || true
            
            docker run -d \
              --name jjautospa-app \
              -p 80:8000 \
              -e DATABASE_HOSTNAME=${{ secrets.DATABASE_HOSTNAME }} \
              -e DATABASE_PORT=${{ secrets.DATABASE_PORT }} \
              -e DATABASE_NAME=${{ secrets.DATABASE_NAME }} \
              -e DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }} \
              -e DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              -e ALGORITHM=${{ secrets.ALGORITHM }} \
              -e ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
              ${{ secrets.DOCKER_HUB_USERNAME }}/jjautospa:latest